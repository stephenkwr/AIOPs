# Local development database: Postgres 16 with the pgvector extension preinstalled.
# Mirrors what Supabase gives us in production, so local and prod share one schema.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: copilot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
